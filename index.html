<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NXTN Company</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F7F2EA;
      color: #333;
    }

    /* 언어 선택 버튼 */
    .lang-switch {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100;
      display: flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .lang-switch button {
      border: 1px solid rgba(80, 80, 80, 0.18);
      background: rgba(255, 255, 255, 0.35);
      color: #555;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }

    .lang-switch button.active {
      background: #B89155;
      color: #fff;
      border-color: #B89155;
    }

    /* 공통 섹션 */
    section {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      overflow: hidden;
    }

    /* 첫 번째 로고 섹션 */
    .logo-hero {
      padding: 0;
      background-color: #F7F2EA;
      background-image: url("logo.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      animation: logoFadeIn 1.8s ease forwards;
    }

    /* 영상 섹션 */
    .video-only {
      padding: 0;
      background: #F3EEE6;
    }

    .bg-video {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* PC 영상 기본 노출 */
    .desktop-video {
      display: block;
    }

    /* 모바일 영상 기본 숨김 */
    .mobile-video {
      display: none;
    }

    /* 텍스트 영역 */
    .inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 980px;
    }

    .fade-section .inner,
    .fade-section > h2,
    .fade-section > a {
      opacity: 0;
      transform: translateY(34px);
      transition:
        opacity 1.1s ease,
        transform 1.1s ease;
    }

    .fade-section.show .inner,
    .fade-section.show > h2,
    .fade-section.show > a {
      opacity: 1;
      transform: translateY(0);
    }

    /* 회사 소개 */
    .about {
      background: #EFE7DD;
      color: #333;
    }

    /* WPC 소개 */
    .wpc-info {
      background: #F8F6F2;
      color: #333;
    }

    .about h2,
    .wpc-info h2,
    .contact h2 {
      margin-bottom: 28px;
      color: #3D3D3D;
      font-size: clamp(38px, 7vw, 88px);
      font-weight: 600;
    }

    .about p,
    .wpc-info p {
      color: #6B6B6B;
      font-size: clamp(18px, 2.4vw, 30px);
      line-height: 1.5;
      word-break: keep-all;
    }

    /* 연락처 */
    .contact {
      background: #E7DDD1;
      color: #333;
      flex-direction: column;
    }

    .contact a {
      color: #555;
      text-decoration: none;
      font-size: clamp(20px, 3vw, 32px);
    }

    @keyframes logoFadeIn {
      from {
        opacity: 0;
        transform: scale(1.03);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* 모바일 */
    @media (max-width: 768px) {
      .lang-switch {
        top: 16px;
        right: 16px;
      }

      .logo-hero {
        background-image: url("logo m.png"), url("logo.png");
        background-size: cover;
        background-position: center center;
      }

      /* PC 영상 숨김 */
      .desktop-video {
        display: none;
      }

      /* 모바일 정방형 영상 노출 */
      .mobile-video {
        display: block;
      }

      .bg-video {
        object-fit: cover;
        object-position: center center;
      }

      section {
        padding: 40px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="lang-switch">
    <button
      type="button"
      class="active"
      onclick="setLanguage('ko')"
    >
      KOR
    </button>

    <button
      type="button"
      onclick="setLanguage('en')"
    >
      ENG
    </button>
  </div>

  <!-- 첫 번째 로고 화면 -->
  <section class="hero logo-hero"></section>

  <!-- 두 번째 영상 화면 -->
  <section class="video-only">

    <!-- PC용 16:9 영상 -->
    <video
      class="bg-video desktop-video"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
    >
      <source
        src="videos/16n9-nxtn.mp4"
        type="video/mp4"
      />
    </video>

    <!-- 모바일용 1:1 정방형 영상 -->
    <video
      class="bg-video mobile-video"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
    >
      <source
        src="videos/1n1-nxtn.mp4"
        type="video/mp4"
      />
    </video>

  </section>

  <!-- 회사 소개 -->
  <section class="about fade-section">
    <div class="inner">
      <h2
        data-ko="NXTN Company"
        data-en="NXTN Company"
      >
        NXTN Company
      </h2>

      <p
        data-ko="NXTN은 신뢰, 기술, 시장에 대한 이해를 바탕으로 제조사와 파트너, 그리고 새로운 비즈니스 기회를 연결합니다."
        data-en="NXTN connects manufacturers, partners, and business opportunities through trust, technology, and market insight."
      >
        NXTN은 신뢰, 기술, 시장에 대한 이해를 바탕으로 제조사와 파트너,
        그리고 새로운 비즈니스 기회를 연결합니다.
      </p>
    </div>
  </section>

  <!-- WPC 소개 -->
  <section class="wpc-info fade-section">
    <div class="inner">
      <h2
        data-ko="WPC Deck"
        data-en="WPC Deck"
      >
        WPC Deck
      </h2>

      <p
        data-ko="내구성과 디자인을 갖춘 현대적인 WPC 데크 솔루션을 야외 공간, 상업 시설, 건축 프로젝트에 제안합니다."
        data-en="We introduce durable and modern WPC decking solutions for outdoor spaces, commercial projects, and architectural applications."
      >
        내구성과 디자인을 갖춘 현대적인 WPC 데크 솔루션을 야외 공간,
        상업 시설, 건축 프로젝트에 제안합니다.
      </p>
    </div>
  </section>

  <!-- 연락처 -->
  <section class="contact fade-section">
    <h2
      data-ko="Contact"
      data-en="Contact"
    >
      Contact
    </h2>

    <a href="mailto:sales@nxtn.co.kr">
      sales@nxtn.co.kr
    </a>
  </section>

  <script>
    function setLanguage(lang) {
      document.documentElement.lang = lang;

      document
        .querySelectorAll("[data-ko][data-en]")
        .forEach(function (element) {
          element.textContent = element.dataset[lang];
        });

      document
        .querySelectorAll(".lang-switch button")
        .forEach(function (button) {
          button.classList.remove("active");
        });

      if (lang === "ko") {
        document
          .querySelector(".lang-switch button:nth-child(1)")
          .classList.add("active");
      } else {
        document
          .querySelector(".lang-switch button:nth-child(2)")
          .classList.add("active");
      }
    }

    setLanguage("ko");

    const observer = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("show");
          }
        });
      },
      {
        threshold: 0.25
      }
    );

    document
      .querySelectorAll(".fade-section")
      .forEach(function (section) {
        observer.observe(section);
      });

    /*
      모바일에서 CSS 전환 후 영상이 정지되는 경우를 방지합니다.
    */
    function playVisibleVideo() {
      const videos = document.querySelectorAll(".bg-video");

      videos.forEach(function (video) {
        const isVisible = window.getComputedStyle(video).display !== "none";

        if (isVisible) {
          video.play().catch(function () {
            // 자동재생이 차단되더라도 페이지 오류는 발생시키지 않습니다.
          });
        } else {
          video.pause();
        }
      });
    }

    window.addEventListener("load", playVisibleVideo);
    window.addEventListener("resize", playVisibleVideo);
    window.addEventListener("orientationchange", playVisibleVideo);
  </script>

</body>
</html>
